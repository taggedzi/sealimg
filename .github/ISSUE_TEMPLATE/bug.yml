name: Bug report
description: Report a defect with repro steps and expected behavior.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Sealimg version/commit:
        - Python version:
        - Command used:
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs / Artifacts
      description: Paste relevant logs, hashes, or output snippets.
      render: shell
    validations:
      required: false
